# Deploy — 수동 트리거(Actions 탭 버튼)로 AWS EC2에 배포한다.
#
# 수동 배포 절차를 그대로 자동화:
#   ① OIDC로 임시 자격증명 (액세스 키 없음 — infra/github-oidc.tf)
#   ② arm64 이미지 빌드 → ECR 푸시 (EC2가 t4g/Graviton이라 arm64)
#   ③ 배포 번들(compose·Caddyfile·fetch-env.sh) S3 업로드
#   ④ SSM Run Command로 EC2에서 pull + up (SSH 불필요)
#   ⑤ 명령 exit code 폴링 — 실패 시 워크플로 빨간불
#
# 신뢰가 쌓이면 on: push(main)로 전환 예정 (#107)
name: Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC 토큰 발급 허용 — 이게 있어야 role assume 가능
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR: 606531136262.dkr.ecr.ap-northeast-2.amazonaws.com
  INSTANCE_ID: i-06558e1c30417fe0f
  DEPLOY_BUCKET: scheduleflow-files-606531136262

jobs:
  build-push:
    name: 이미지 빌드 → ECR
    # EC2(t4g)와 같은 arm64 네이티브 러너 — QEMU 에뮬레이션 없이 빌드 (public repo 무료)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: AWS 임시 자격증명 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: 백엔드 이미지 빌드·푸시
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          push: true
          tags: |
            ${{ env.ECR }}/scheduleflow-backend:latest
            ${{ env.ECR }}/scheduleflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 프론트 이미지 빌드·푸시
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR }}/scheduleflow-frontend:latest
            ${{ env.ECR }}/scheduleflow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: EC2 배포 (SSM)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AWS 임시 자격증명 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 배포 번들 S3 업로드
        run: aws s3 sync deploy/aws/ "s3://${DEPLOY_BUCKET}/deploy/"

      - name: EC2 배포 명령 실행 + 결과 대기
        run: |
          # 수동 SSM 세션에서 치던 명령을 send-command로 원격 실행 (root로 실행됨)
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::8} by ${GITHUB_ACTOR}" \
            --parameters 'commands=[
              "set -euo pipefail",
              "cd /home/ec2-user/app",
              "aws s3 sync s3://scheduleflow-files-606531136262/deploy/ .",
              "bash fetch-env.sh",
              "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 606531136262.dkr.ecr.ap-northeast-2.amazonaws.com",
              "docker compose pull",
              "docker compose up -d",
              "docker image prune -f"
            ]' \
            --query 'Command.CommandId' --output text)
          echo "SSM CommandId: $CMD_ID"

          # exit code 폴링 — 최대 5분
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text)
            echo "[$i] $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                echo "── EC2 stderr ──"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query StandardErrorContent --output text
                exit 1 ;;
            esac
            [ "$i" = 30 ] && { echo "폴링 타임아웃(5분)"; exit 1; }
          done

      - name: 헬스체크
        run: |
          sleep 15
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" https://scheduleflow-app.duckdns.org/
