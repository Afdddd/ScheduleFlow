# CI — PR/main push마다 백엔드 테스트와 프론트 lint·빌드를 검증한다.
# 배포(CD)는 deploy.yml에서 별도 수동 트리거로 수행.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-test:
    name: 백엔드 테스트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Gradle 의존성 캐시 — 매 실행 전체 다운로드 방지
      - uses: gradle/actions/setup-gradle@v4

      - name: 테스트 실행
        working-directory: backend
        run: ./gradlew test

  frontend-check:
    name: 프론트 lint + 빌드
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci --legacy-peer-deps

      # 우리 코드 품질 게이트 — 경고 하나라도 있으면 실패
      - name: ESLint (경고 0 강제)
        run: npx eslint src --ext .ts,.tsx --max-warnings 0

      # CI=false인 이유: 서드파티 의존성의 webpack 경고("Critical dependency") 1건은
      # 우리가 고칠 수 없는데 CRA는 CI=true면 경고를 전부 에러로 취급한다.
      # 우리 코드의 경고는 위 ESLint 스텝이 --max-warnings 0으로 강제한다.
      - name: 프로덕션 빌드
        run: CI=false npm run build
