spring:
  # 마이그레이션 SQL이 MySQL 전용(PREPARE/information_schema)이라 H2 테스트에선 끈다.
  # 테스트 스키마는 ddl-auto: update가 엔티티 기준으로 생성한다.
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  config:
    import: optional:file:.env[.properties]

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect


storage:
  path: ${FILE_UPLOAD_PATH:C:\ScheduleFlow}

jwt:
  secret-key: dGVzdC1zZWNyZXQta2V5LXRlc3Qtc2VjcmV0LWtleS10ZXN0LXNlY3JldC1rZXk=
  expiration: 3600000
  refresh-expiration: 1209600000
