server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3307/scheduleflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

  flyway:
    enabled: true
    # 이미 데이터가 있는 DB(로컬·운영 RDS)는 baseline(0)만 찍고 그 이후 버전부터 적용한다.
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    show-sql: true
    open-in-view: false
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50

jwt:
  secret-key: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  # 리프레시 토큰 만료(ms). 기본 14일 — env 미설정 환경에서도 동작하도록 기본값을 둔다.
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator — 헬스체크만 최소 노출. context-path가 /api라 실제 경로는 /api/actuator/*.
#   /api/actuator/health           : DB 포함 종합 상태(DB 다운 시 503) — "서비스 가능한가"
#   /api/actuator/health/liveness  : 프로세스 생존만(DB 무관) — UptimeRobot 죽음 감지용
# show-details=never: 공개 엔드포인트라 내부 상태(DB·디스크 등) 세부는 숨긴다.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  cors:
    # 기본값은 로컬 개발용(localhost·사설/테일스케일 IP). prod는 배포 시
    # APP_CORS_ALLOWED_ORIGINS 환경변수로 실도메인을 주입한다(예: https://<서브도메인>.duckdns.org).
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:*,http://192.168.0.49,http://192.168.0.49:*,http://100.83.84.21,http://100.83.84.21:*}