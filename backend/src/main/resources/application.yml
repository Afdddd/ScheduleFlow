server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3307/scheduleflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

  jpa:
    show-sql: true
    open-in-view: false
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50

jwt:
  secret-key: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  # 리프레시 토큰 만료(ms). 기본 14일 — env 미설정 환경에서도 동작하도록 기본값을 둔다.
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  cors:
    # 기본값은 로컬 개발용(localhost·사설/테일스케일 IP). prod는 배포 시
    # APP_CORS_ALLOWED_ORIGINS 환경변수로 실도메인을 주입한다(예: https://<서브도메인>.duckdns.org).
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:*,http://192.168.0.49,http://192.168.0.49:*,http://100.83.84.21,http://100.83.84.21:*}